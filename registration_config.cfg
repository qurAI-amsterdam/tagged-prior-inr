[training]
lr = 1e-05
optimizer = 'adam'
scheduler = True
batch_size = 10000
temporal_delta = 1

[regularization]
raw_jacobian_regularization = False
jacobian_regularization = False
alpha_jacobian = 0.25
alpha_bending = 0
early_stopping = True
background_weight = 0.0001

[image hyperparameters]
use_mask_loss = True
use_contour = True
reg_with_mask = True
use_shape_loss = False
omit_base_apex = True
omit_base_apex_perc = 0

[network]
normalize_coords = True
layers = [4, 256, 256, 256, 3]
network_type = "SIREN"
omega = 45
use_prior = True
path_to_prior = ""

[input]
sax_aligned = False
in_xyz_shape = True
xyz_sequence = True
temporal_registration = True

[experiment]
description = Baseline run — all regularisation off
seed = 0
epochs = 500
early_stop = 1
multiple_nets = 0
crop = True
all_timepoints = True
convert_to_engineering = True
compute_physical_dvf = False
strain_gaussian_sigma = 1

[general settings]
wandb_enabled = False
multiprocessing = False
debug = True
save_net = True
verbose = False
save = True

root = ""
path_to_data = ""
path_to_segmentation = ""
dataset = ""
dataset_arg = ""


experiment_folder_name = Experiment_final_test_tagged
